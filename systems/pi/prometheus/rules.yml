groups:
  - name: AllInstances
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU load ({{ $labels.instance }})"
          description: 'CPU load is {{ printf "%.1f" $value }}% on {{ $labels.instance }}.'

      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Out of memory ({{ $labels.instance }})"
          description: 'Only {{ printf "%.1f" $value }}% memory available on {{ $labels.instance }}.'

      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 8 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Out of disk space ({{ $labels.instance }})"
          description: 'Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} has only {{ printf "%.1f" $value }}% free.'

      - alert: HostFilesystemReadOnly
        expr: node_filesystem_readonly{fstype!~"squashfs|tmpfs|overlay"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem is read-only ({{ $labels.instance }})"
          description: "{{ $labels.mountpoint }} on {{ $labels.device }} has become read-only, possibly due to disk errors."

      - alert: HostMountFailed
        expr: node_filesystem_device_error{mountpoint=~"/mnt/.*"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Mount error on {{ $labels.mountpoint }} ({{ $labels.instance }})"
          description: "Filesystem error on {{ $labels.device }} at {{ $labels.mountpoint }}. The drive may have disconnected or failed."

      - alert: HostHighTemperature
        expr: node_hwmon_temp_celsius > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High temperature ({{ $labels.instance }})"
          description: 'CPU temperature is {{ printf "%.0f" $value }}°C on {{ $labels.instance }}. Performance may be throttled.'

      - alert: HostHighLoadAverage
        expr: node_load5 > 6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High load average ({{ $labels.instance }})"
          description: '5-minute load average is {{ printf "%.2f" $value }} on {{ $labels.instance }}.'

      - alert: HostSwapUsage
        expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100 > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High swap usage ({{ $labels.instance }})"
          description: 'Swap is {{ printf "%.1f" $value }}% used on {{ $labels.instance }}.'

      - alert: HostOomKills
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "OOM killer active ({{ $labels.instance }})"
          description: '{{ $labels.instance }} killed {{ printf "%.0f" $value }} processes due to memory pressure.'

      - alert: HostNetworkErrors
        expr: increase(node_network_receive_errs_total{device!="lo"}[5m]) > 10 or increase(node_network_transmit_errs_total{device!="lo"}[5m]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Network errors on {{ $labels.device }} ({{ $labels.instance }})"
          description: 'Interface {{ $labels.device }} on {{ $labels.instance }} has {{ printf "%.0f" $value }} errors in the last 5 minutes.'

      - alert: HostClockDrift
        expr: abs(node_timex_offset_seconds) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Clock drift detected ({{ $labels.instance }})"
          description: 'System clock on {{ $labels.instance }} is off by {{ printf "%.2f" $value }}s.'

      - alert: HostSystemdServiceFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.name }} failed ({{ $labels.instance }})"
          description: "Systemd unit {{ $labels.name }} on {{ $labels.instance }} has failed."

      - alert: BlockyHighQueryFailures
        expr: rate(blocky_query_total{response_type="BLOCKED"}[5m]) / rate(blocky_query_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High DNS block rate ({{ $labels.instance }})"
          description: "{{ $value | humanizePercentage }} of DNS queries are being blocked. This could indicate misconfiguration or malware."

      - alert: SuspiciousDnsSpike
        expr: rate(blocky_query_total[5m]) > 20 * avg_over_time(rate(blocky_query_total[5m])[1d:5m])
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Unusual DNS query spike ({{ $labels.instance }})"
          description: 'DNS query rate of {{ printf "%.1f" $value }}/s is much higher than daily average. This could indicate malware or a DoS attack.'

      - alert: HighOutboundConnections
        expr: node_netstat_Tcp_CurrEstab > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High TCP connections ({{ $labels.instance }})"
          description: '{{ printf "%.0f" $value }} established connections on {{ $labels.instance }}.'

      - alert: HostUnstable
        expr: changes(up[30m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} is unstable"
          description: '{{ $labels.instance }} has gone up and down {{ printf "%.0f" $value }} times in the last 30 minutes.'

      - alert: HostIdle
        expr: (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[10m])) * 100) > 98 and on(instance) up == 1
        for: 4h
        labels:
          severity: info
        annotations:
          summary: "{{ $labels.instance }} idling"
          description: '{{ $labels.instance }} has been running with {{ printf "%.1f" $value }}% CPU idle for over 4 hours.'

      - alert: HostRebooted
        expr: time() - node_boot_time_seconds < 300
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "{{ $labels.instance }} rebooted"
          description: '{{ $labels.instance }} booted {{ printf "%.0f" $value }} seconds ago.'

      - alert: BtrfsErrors
        expr: node_btrfs_device_read_errs_total + node_btrfs_device_write_errs_total + node_btrfs_device_flush_errs_total + node_btrfs_device_corruption_errs_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "BTRFS errors ({{ $labels.instance }})"
          description: 'BTRFS device {{ $labels.device }} has {{ printf "%.0f" $value }} errors. Data may be corrupted.'

      - alert: NfsServerDown
        expr: node_systemd_unit_state{name="nfs-server.service",state="active"} != 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "NFS server down ({{ $labels.instance }})"
          description: "NFS server service is not running on {{ $labels.instance }}."

      - alert: HostDiskIOSaturated
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk I/O saturated ({{ $labels.instance }})"
          description: "Disk {{ $labels.device }} is busy {{ $value | humanizePercentage }} of the time."

      - alert: HostHighSdCardWrites
        expr: rate(node_disk_written_bytes_total{device=~"mmcblk[0-9]+$"}[15m]) / 1024 / 1024 > 0.5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High SD card write rate ({{ $labels.instance }})"
          description: 'SD card {{ $labels.device }} is writing {{ printf "%.2f" $value }} MB/s for 30 minutes. Sustained writes can reduce SD card lifespan.'

      - alert: HostVeryHighSdCardWrites
        expr: rate(node_disk_written_bytes_total{device=~"mmcblk[0-9]+$"}[5m]) / 1024 / 1024 > 2
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Very high SD card write rate ({{ $labels.instance }})"
          description: 'SD card {{ $labels.device }} is writing {{ printf "%.2f" $value }} MB/s for 15 minutes. This level of sustained writes can quickly wear SD cards.'

      - alert: HostSdCardWriteVolume
        expr: increase(node_disk_written_bytes_total{device=~\"mmcblk[0-9]+$\"}[24h]) / 1024 / 1024 / 1024 > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High daily SD card writes ({{ $labels.instance }})"
          description: 'SD card {{ $labels.device }} wrote {{ printf "%.2f" $value }} GB in the last 24 hours. Repeated small writes can reduce SD card lifespan.'

      - alert: ZombieProcesses
        expr: node_processes_state{state="Z"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Zombie processes ({{ $labels.instance }})"
          description: '{{ printf "%.0f" $value }} zombie processes detected on {{ $labels.instance }}.'

      - alert: FileDescriptorExhaustion
        expr: node_filefd_allocated / node_filefd_maximum > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "File descriptors running low ({{ $labels.instance }})"
          description: "{{ $value | humanizePercentage }} of file descriptors are in use on {{ $labels.instance }}."

      - alert: HomeAssistantDown
        expr: node_systemd_unit_state{name="docker-home-assistant.service",state="active"} != 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Home Assistant down ({{ $labels.instance }})"
          description: "Home Assistant Docker container is not running on {{ $labels.instance }}."
