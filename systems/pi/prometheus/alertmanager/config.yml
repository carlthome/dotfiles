global:
  resolve_timeout: 1m
  slack_api_url: $SLACK_API_URL

route:
  receiver: slack
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

inhibit_rules:
  # Critical alerts suppress warnings for the same alert
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname]

  # If an instance is down, suppress all other alerts for it
  - source_matchers:
      - alertname="InstanceDown"
    target_matchers:
      - severity=~"warning|info"
    equal: [instance]

receivers:
  - name: slack
    slack_configs:
      - channel: $SLACK_CHANNEL
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        color: '{{ template "slack.color" . }}'
        text: '{{ template "slack.text" . }}'
        actions:
          - type: button
            text: "1 hour"
            url: '{{ template "silence.1h.link" . }}'
          - type: button
            text: "4 hours"
            url: '{{ template "silence.4h.link" . }}'
          - type: button
            text: "Until tomorrow"
            url: '{{ template "silence.tomorrow.link" . }}'
          - type: button
            text: "Until next week"
            url: '{{ template "silence.week.link" . }}'
          - type: button
            text: "Until next month"
            url: '{{ template "silence.month.link" . }}'

templates:
  - "/etc/alertmanager/templates/*.tmpl"
