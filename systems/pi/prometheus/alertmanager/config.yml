global:
  resolve_timeout: 1m
  slack_api_url: $SLACK_API_URL

route:
  receiver: slack
  group_by: [alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname]

receivers:
  - name: slack
    slack_configs:
      - channel: $SLACK_CHANNEL
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        color: '{{ template "slack.color" . }}'
        text: '{{ template "slack.text" . }}'
        actions:
          - type: button
            text: "Silence 1h"
            url: '{{ template "silence.1h.link" . }}'
          - type: button
            text: "Silence 24h"
            url: '{{ template "silence.24h.link" . }}'

templates:
  - "/etc/alertmanager/templates/*.tmpl"
