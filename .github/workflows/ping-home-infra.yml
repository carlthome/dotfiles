on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/ping-home-infra.yml"
      - "packages/ping-home/terraform/**"

jobs:
  plan-and-apply:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/ping-home/terraform
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_google_project: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      TF_VAR_google_region: ${{ vars.GOOGLE_CLOUD_REGION }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GOOGLE_CLOUD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GOOGLE_CLOUD_TERRAFORM_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET_NAME }}"
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
