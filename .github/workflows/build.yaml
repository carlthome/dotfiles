on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore

permissions:
  contents: read
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    concurrency:
      group: detect-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: actions/cache/restore@v5
        with:
          path: ~/.cache/nix
          key: nix-eval-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-keys: nix-eval-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
      - run: nix flake check --all-systems --no-build
      - id: detect
        run: .github/scripts/detect-builds.sh
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: ~/.cache/nix
          key: nix-eval-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}

  build:
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.name }}
    concurrency:
      group: ${{ matrix.attr }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        if: matrix.system == 'aarch64-linux'
        with:
          platforms: arm64
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: ${{ matrix.system == 'aarch64-linux' && 'extra-platforms = aarch64-linux' || '' }}
      - uses: cachix/cachix-action@v17
        with:
          name: carlthome
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build --print-build-logs .#${{ matrix.attr }}
