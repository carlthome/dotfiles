groups:
  - name: AllInstances
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Host high CPU load (instance {{ $labels.instance }})"
          description: "CPU load is > 80%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Host out of memory (instance {{ $labels.instance }})"
          description: "Node memory is filling up (< 10% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 8 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Host out of disk space (instance {{ $labels.instance }})"
          description: "Disk is almost full (< 8% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

      - alert: HostFilesystemReadOnly
        expr: node_filesystem_readonly == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem is read-only (instance {{ $labels.instance }})"
          description: "{{ $labels.mountpoint }} has become read-only, possibly due to disk errors"

      - alert: HostMountFailed
        expr: node_filesystem_device_error{mountpoint=~"/mnt/.*"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Mount error on {{ $labels.mountpoint }}"
          description: "Filesystem error detected - USB drive may have disconnected or failed"

      - alert: HostHighTemperature
        expr: node_hwmon_temp_celsius > 70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High temperature ({{ $labels.instance }})"
          description: "CPU temperature is {{ $value }}°C - Pi may throttle at 80°C"

      - alert: HostThrottling
        expr: node_hwmon_temp_celsius > 80
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Thermal throttling ({{ $labels.instance }})"
          description: "CPU at {{ $value }}°C - performance is being throttled"

      - alert: HostHighLoadAverage
        expr: node_load5 > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High load average ({{ $labels.instance }})"
          description: "5-minute load average is {{ $value }} (Pi has 4 cores)"

      - alert: HostSwapUsage
        expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100 > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High swap usage ({{ $labels.instance }})"
          description: "Swap is {{ $value }}% used - system may be memory constrained"

      - alert: HostOomKills
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "OOM killer active ({{ $labels.instance }})"
          description: "System killed processes due to memory pressure"

      - alert: HostNetworkErrors
        expr: increase(node_network_receive_errs_total{device!="lo"}[5m]) > 10 or increase(node_network_transmit_errs_total{device!="lo"}[5m]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Network errors on {{ $labels.device }}"
          description: "Interface {{ $labels.device }} has network errors"

      - alert: HostClockDrift
        expr: abs(node_timex_offset_seconds) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Clock drift detected ({{ $labels.instance }})"
          description: "System clock is off by {{ $value }}s - may affect Home Assistant automations"

      - alert: HostSystemdServiceFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.name }} failed"
          description: "Systemd unit {{ $labels.name }} has failed"

      - alert: BlockyHighQueryFailures
        expr: rate(blocky_query_total{response_type="BLOCKED"}[5m]) / rate(blocky_query_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High DNS block rate"
          description: "Over 50% of DNS queries are being blocked - possible misconfiguration or malware"

      - alert: SuspiciousDnsSpike
        expr: rate(blocky_query_total[5m]) > 20 * avg_over_time(rate(blocky_query_total[5m])[1d:5m])
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Unusual DNS query spike"
          description: "DNS queries are 20x higher than daily average - possible malware or DoS"

      - alert: HighOutboundConnections
        expr: node_netstat_Tcp_CurrEstab > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High TCP connections ({{ $labels.instance }})"
          description: "{{ $value }} established connections - possible compromise or misconfiguration"

      - alert: HostUnstable
        expr: changes(up[30m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} is unstable"
          description: "Instance has gone up/down {{ $value }} times in the last 30 minutes - possible suspend/wake bug"

      - alert: HostIdle
        expr: (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[10m])) * 100) > 98 and on(instance) up == 1
        for: 4h
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} idling"
          description: "Instance has been running with >98% CPU idle for 4+ hours - should probably suspend"

      - alert: HostRebooted
        expr: time() - node_boot_time_seconds < 300
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} rebooted"
          description: "Instance booted within the last 5 minutes"

      - alert: BtrfsErrors
        expr: node_btrfs_device_read_errs_total + node_btrfs_device_write_errs_total + node_btrfs_device_flush_errs_total + node_btrfs_device_corruption_errs_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "BTRFS errors on {{ $labels.instance }}"
          description: "BTRFS device has errors - data may be corrupted"

      - alert: NfsServerDown
        expr: node_systemd_unit_state{name="nfs-server.service",state="active"} != 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "NFS server down on {{ $labels.instance }}"
          description: "NFS server service is not running - T1 mounts will fail"

      - alert: HostDiskIOSaturated
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk I/O saturated on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} is busy >90% of the time"

      - alert: ZombieProcesses
        expr: node_processes_state{state="Z"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Zombie processes on {{ $labels.instance }}"
          description: "{{ $value }} zombie processes detected"

      - alert: FileDescriptorExhaustion
        expr: node_filefd_allocated / node_filefd_maximum > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "File descriptors running low on {{ $labels.instance }}"
          description: "Over 80% of file descriptors in use"

      - alert: HomeAssistantDown
        expr: node_systemd_unit_state{name="docker-home-assistant.service",state="active"} != 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Home Assistant container down"
          description: "Home Assistant Docker container is not running"
